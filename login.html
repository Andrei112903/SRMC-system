<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="SMRC Convention System Dashboard">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    <title>SMRC Convention System</title>
  </head>
  <body class="bg-slate-50 text-slate-900 font-sans antialiased h-screen overflow-hidden">
    
    <!-- LOGIN SCREEN -->
    <div id="view-login" class="flex flex-col items-center justify-center w-full h-full bg-slate-800 text-white z-[100] absolute inset-0">
      <div class="bg-slate-900 w-full max-w-sm rounded-2xl shadow-2xl p-8 border border-slate-700 m-4">
        <div class="text-center mb-8">
          <h1 class="text-3xl font-bold tracking-tight text-white mb-1">SMRC <span class="text-blue-500">System</span></h1>
          <p class="text-slate-400 text-sm">Please sign in to your dashboard</p>
        </div>
        <form id="login-form" class="space-y-5">
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5" for="email">Email</label>
            <input type="email" id="email" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all block text-sm" placeholder="admin@test.com" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-300 mb-1.5" for="password">Password</label>
            <input type="password" id="password" class="w-full px-4 py-3 bg-slate-800/50 border border-slate-600 rounded-lg text-white placeholder-slate-500 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all block text-sm" placeholder="••••••••" required>
          </div>
          <p id="login-error" class="text-red-400 text-sm font-medium hidden text-center bg-red-500/10 py-2 rounded-md border border-red-500/20"></p>
          <button id="login-submit-btn" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition-colors shadow-lg shadow-blue-500/25 flex justify-center items-center gap-2">
            Sign In
          </button>
        </form>
      </div>
    </div>

    <!-- App entry point scripts -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
